<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Action Research Assistant</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <section class="sidebar-card stage-card">
          <div class="stage-header">
            <p class="section-title">Stages</p>
            <span id="stage-summary" class="stage-summary">准备开始</span>
          </div>
          <ol id="stage-plan" class="stage-list">
            <li class="stage-item pending">
              <div class="stage-index">1</div>
              <div class="stage-content">
                <p class="stage-label">等待开始</p>
                <p class="stage-reason">先抛出你的大致想法，Stage 1 会出现在这里。</p>
              </div>
            </li>
          </ol>
          <button id="continue-stage-button" class="secondary-button" type="button">
            Confirm
          </button>
        </section>
      </aside>

      <main class="chat-layout">
        <header class="chat-header">
          <div>
            <p class="chat-header-kicker">对话区</p>
            <h2>分阶段对话</h2>
          </div>
          <div id="question-chip" class="question-chip">Start with your idea. We will move one stage at a time.</div>
        </header>

        <section id="chat-feed" class="chat-feed">
          <div class="empty-state">
            <h3>先说一个想法</h3>
            <p>你先说个大概想法，我会先简短回应，然后从 Stage 1 开始。</p>
          </div>
        </section>

        <form id="chat-form" class="composer">
          <textarea
            id="chat-input"
            class="composer-input"
            rows="1"
            placeholder="输入你的想法，或者直接回答当前这两个问题。"
          ></textarea>
          <button id="send-button" class="send-button" type="submit">发送</button>
        </form>
      </main>

      <aside class="doc-panel">
        <div class="doc-card">
          <div class="doc-toolbar">
            <select id="doc-selector" class="doc-selector" aria-label="阶段文稿选择器">
              <option value="">暂无文稿</option>
            </select>
            <span id="doc-status-pill" class="doc-status-pill">未就绪</span>
          </div>

          <div class="doc-preview-wrap">
            <div class="doc-editor-header">
              <span id="doc-editor-status" class="doc-editor-status">只读</span>
            </div>
            <textarea id="doc-preview" class="doc-preview" rows="18">右侧会显示当前阶段文稿。</textarea>
          </div>

          <div class="doc-actions">
            <button id="save-doc-button" class="primary-button" type="button">保存</button>
            <a id="download-doc" class="secondary-link disabled" href="#" target="_blank" rel="noreferrer">
              下载
            </a>
            <label class="upload-compact">
              <span>导入 docx</span>
              <input id="doc-upload" type="file" accept=".docx" />
            </label>
          </div>
        </div>
      </aside>
    </div>

    <template id="bubble-template">
      <article class="bubble-row">
        <div class="avatar"></div>
        <div class="bubble"></div>
      </article>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
